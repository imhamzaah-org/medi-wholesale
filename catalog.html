<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catalog — MediWholesale</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080d14;
      --bg2: #0d1520;
      --bg3: #111d2e;
      --teal: #00d4aa;
      --teal2: #00a882;
      --blue: #0ea5e9;
      --text: #e8f4f8;
      --muted: #7a9bb5;
      --border: rgba(0,212,170,0.12);
      --card: rgba(13,21,32,0.9);
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    /* ── NAVBAR ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5%;
      height: 68px;
      background: rgba(8,13,20,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.35rem;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-logo span { color: var(--teal); }

    .nav-logo-dot {
      width: 8px; height: 8px;
      background: var(--teal);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover, .nav-links a.active { color: var(--teal); }

    .nav-actions { display: flex; align-items: center; gap: 12px; }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 18px;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-ghost:hover { border-color: var(--teal); color: var(--teal); }

    .btn-primary {
      background: var(--teal);
      border: none;
      color: #080d14;
      padding: 9px 20px;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary:hover { background: var(--teal2); }

    .cart-count {
      background: #ef4444;
      color: white;
      font-size: 0.65rem;
      font-weight: 700;
      width: 18px; height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 108px 5% 40px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .breadcrumb a { color: var(--muted); text-decoration: none; }
    .breadcrumb a:hover { color: var(--teal); }
    .breadcrumb span { color: var(--teal); }

    .page-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 800;
      margin-bottom: 8px;
    }

    .page-header p {
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ── SEARCH BAR ── */
    .search-bar-wrap {
      padding: 20px 5%;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 68px;
      z-index: 50;
    }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 16px;
      max-width: 600px;
      transition: border-color 0.2s;
    }

    .search-bar:focus-within { border-color: var(--teal); }

    .search-bar svg { color: var(--muted); flex-shrink: 0; }

    .search-bar input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      padding: 14px 0;
    }

    .search-bar input::placeholder { color: var(--muted); }

    /* ── LAYOUT ── */
    .catalog-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 0;
      min-height: calc(100vh - 200px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--bg2);
      border-right: 1px solid var(--border);
      padding: 28px 20px;
      position: sticky;
      top: 136px;
      height: fit-content;
      max-height: calc(100vh - 140px);
      overflow-y: auto;
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .filter-section { margin-bottom: 28px; }

    .filter-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .filter-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 4px;
    }

    .filter-option:hover { background: rgba(0,212,170,0.05); }
    .filter-option.active { background: rgba(0,212,170,0.08); }

    .filter-option input[type="radio"],
    .filter-option input[type="checkbox"] {
      accent-color: var(--teal);
      width: 15px; height: 15px;
      cursor: pointer;
    }

    .filter-option label {
      font-size: 0.875rem;
      color: var(--text);
      cursor: pointer;
      flex: 1;
    }

    .filter-option .count {
      font-size: 0.72rem;
      color: var(--muted);
      background: rgba(255,255,255,0.05);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    .price-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .price-input {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }

    .price-input:focus { border-color: var(--teal); }

    .clear-filters {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 9px;
      border-radius: 7px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .clear-filters:hover { border-color: #ef4444; color: #f87171; }

    /* ── MAIN CONTENT ── */
    .catalog-main { padding: 24px 28px; }

    .catalog-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .results-count {
      font-size: 0.875rem;
      color: var(--muted);
    }

    .results-count strong { color: var(--text); }

    .sort-select {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 7px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
    }

    .view-toggle {
      display: flex;
      gap: 4px;
    }

    .view-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 34px; height: 34px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-size: 0.85rem;
    }

    .view-btn.active, .view-btn:hover {
      border-color: var(--teal);
      color: var(--teal);
    }

    /* ── PRODUCTS GRID ── */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }

    .products-grid.list-view {
      grid-template-columns: 1fr;
    }

    .product-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: all 0.3s;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      animation: fadeUp 0.4s ease both;
    }

    .products-grid.list-view .product-card {
      flex-direction: row;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .product-card:hover {
      border-color: rgba(0,212,170,0.3);
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.35);
    }

    .products-grid.list-view .product-card:hover {
      transform: translateX(4px) translateY(0);
    }

    .product-img {
      height: 130px;
      background: linear-gradient(135deg, rgba(0,212,170,0.06), rgba(14,165,233,0.06));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      border-bottom: 1px solid var(--border);
      position: relative;
      flex-shrink: 0;
    }

    .products-grid.list-view .product-img {
      width: 120px;
      height: auto;
      border-bottom: none;
      border-right: 1px solid var(--border);
    }

    .product-badge {
      position: absolute;
      top: 8px; right: 8px;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-in {
      background: rgba(0,212,170,0.12);
      border: 1px solid rgba(0,212,170,0.25);
      color: var(--teal);
    }

    .badge-out {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #f87171;
    }

    .product-body {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .product-brand {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--teal);
      font-weight: 600;
      margin-bottom: 5px;
    }

    .product-name {
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      margin-bottom: 3px;
      line-height: 1.3;
    }

    .product-composition {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 12px;
      flex: 1;
    }

    .product-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .product-price {
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--teal);
    }

    .product-price span {
      font-size: 0.7rem;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
    }

    .product-moq {
      font-size: 0.7rem;
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      padding: 3px 7px;
      border-radius: 4px;
    }

    .product-moq strong { color: var(--text); }

    /* ── ACTIVE FILTERS ── */
    .active-filters {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .filter-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,212,170,0.08);
      border: 1px solid rgba(0,212,170,0.2);
      color: var(--teal);
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 100px;
    }

    .filter-tag button {
      background: none;
      border: none;
      color: var(--teal);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0;
      line-height: 1;
    }

    /* ── SKELETON ── */
    .skeleton {
      background: linear-gradient(90deg, var(--bg3) 25%, rgba(255,255,255,0.04) 50%, var(--bg3) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      grid-column: 1 / -1;
    }

    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 16px; }
    .empty-state h3 { font-family: 'Syne', sans-serif; color: var(--text); margin-bottom: 8px; }
    .empty-state p { font-size: 0.875rem; }

    /* ── LOAD MORE ── */
    .load-more-wrap {
      text-align: center;
      padding: 32px 0;
    }

    .btn-load-more {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 32px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-load-more:hover {
      border-color: var(--teal);
      color: var(--teal);
    }

    /* ── MOBILE FILTER TOGGLE ── */
    .mobile-filter-btn {
      display: none;
      align-items: center;
      gap: 8px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 16px;
      border-radius: 7px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      cursor: pointer;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .catalog-layout { grid-template-columns: 1fr; }
      .sidebar {
        position: fixed;
        top: 0; left: -280px;
        width: 260px;
        height: 100vh;
        max-height: 100vh;
        z-index: 200;
        transition: left 0.3s ease;
        padding-top: 80px;
        background: var(--bg2);
        box-shadow: 4px 0 30px rgba(0,0,0,0.4);
      }
      .sidebar.open { left: 0; }
      .mobile-filter-btn { display: flex; }
      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 190;
      }
      .sidebar-overlay.open { display: block; }
      .catalog-main { padding: 20px 16px; }
      .nav-links { display: none; }
    }

    @media (max-width: 480px) {
      .products-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- ── NAVBAR ── -->
<nav>
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-dot"></div>
    Medi<span>Wholesale</span>
  </a>
  <ul class="nav-links">
    <li><a href="catalog.html" class="active">Catalog</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Contact</a></li>
    <li><a href="#">Track Order</a></li>
  </ul>
  <div class="nav-actions">
    <a href="cart.html" class="btn-ghost" style="display:flex;align-items:center;gap:6px">
      🛒 Cart <span class="cart-count" id="cartCount">0</span>
    </a>
    <a href="login.html" class="btn-primary">Login</a>
  </div>
</nav>

<!-- ── PAGE HEADER ── -->
<div class="page-header">
  <div class="breadcrumb">
    <a href="index.html">Home</a>
    <span>›</span>
    <span style="color:var(--text)">Catalog</span>
  </div>
  <h1>Product Catalog</h1>
  <p id="headerDesc">Browse all medical products with wholesale pricing</p>
</div>

<!-- ── SEARCH BAR ── -->
<div class="search-bar-wrap">
  <div class="search-bar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Search by product name, brand, composition..."/>
    <button onclick="clearSearch()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem" id="clearSearchBtn">✕</button>
  </div>
</div>

<!-- ── SIDEBAR OVERLAY ── -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- ── LAYOUT ── -->
<div class="catalog-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="filter-section">
      <div class="filter-title">Category</div>
      <div id="categoryFilters">
        <div class="filter-option">
          <input type="radio" name="category" id="cat-all" value="all" checked>
          <label for="cat-all">All Categories</label>
        </div>
        <!-- Dynamic categories loaded here -->
      </div>
    </div>

    <div class="divider"></div>

    <div class="filter-section">
      <div class="filter-title">Availability</div>
      <div class="filter-option">
        <input type="radio" name="stock" id="stock-all" value="all" checked>
        <label for="stock-all">All</label>
      </div>
      <div class="filter-option">
        <input type="radio" name="stock" id="stock-in" value="in">
        <label for="stock-in">In Stock Only</label>
      </div>
      <div class="filter-option">
        <input type="radio" name="stock" id="stock-out" value="out">
        <label for="stock-out">Out of Stock</label>
      </div>
    </div>

    <div class="divider"></div>

    <div class="filter-section">
      <div class="filter-title">Price Range (per unit ₹)</div>
      <div class="price-inputs">
        <input type="number" class="price-input" id="priceMin" placeholder="Min" min="0">
        <input type="number" class="price-input" id="priceMax" placeholder="Max" min="0">
      </div>
    </div>

    <div class="divider"></div>

    <div class="filter-section">
      <div class="filter-title">Brand</div>
      <div id="brandFilters">
        <!-- Dynamic brands loaded here -->
      </div>
    </div>

    <button class="clear-filters" onclick="clearAllFilters()">✕ Clear All Filters</button>
  </aside>

  <!-- MAIN CATALOG -->
  <main class="catalog-main">
    <div class="catalog-toolbar">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <button class="mobile-filter-btn" onclick="openSidebar()">
          ☰ Filters
        </button>
        <div class="results-count" id="resultsCount">Loading products...</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <select class="sort-select" id="sortSelect" onchange="applyFilters()">
          <option value="default">Sort: Default</option>
          <option value="price_asc">Price: Low to High</option>
          <option value="price_desc">Price: High to Low</option>
          <option value="name_asc">Name: A to Z</option>
          <option value="moq_asc">MOQ: Low to High</option>
        </select>
        <div class="view-toggle">
          <button class="view-btn active" id="gridBtn" onclick="setView('grid')" title="Grid View">⊞</button>
          <button class="view-btn" id="listBtn" onclick="setView('list')" title="List View">☰</button>
        </div>
      </div>
    </div>

    <!-- Active Filter Tags -->
    <div class="active-filters" id="activeFilters"></div>

    <!-- Products Grid -->
    <div class="products-grid" id="productsGrid">
      <!-- Skeletons -->
      <div style="height:260px;border-radius:14px" class="skeleton"></div>
      <div style="height:260px;border-radius:14px" class="skeleton"></div>
      <div style="height:260px;border-radius:14px" class="skeleton"></div>
      <div style="height:260px;border-radius:14px" class="skeleton"></div>
      <div style="height:260px;border-radius:14px" class="skeleton"></div>
      <div style="height:260px;border-radius:14px" class="skeleton"></div>
    </div>

    <div class="load-more-wrap" id="loadMoreWrap" style="display:none">
      <button class="btn-load-more" onclick="loadMore()">Load More Products</button>
    </div>
  </main>
</div>

  const SUPABASE_URL = 'https://doduxjtqphzrthqbfaor.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvZHV4anRxcGh6cnRocWJmYW9yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTcyOTAsImV4cCI6MjA4OTQ5MzI5MH0.HRvDWoG4E-Gus2LmaCz0xwd-HkY72eUpn6jOTAG4yio';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON);

  const catEmojis = {
    'Tablets & Capsules': '💊','Injectables': '💉',
    'Surgical Supplies': '🩺','OTC Products': '🧴',
    'Medical Equipment': '🏥','Syrups & Liquids': '🧪'
  };

  let allProducts = [];
  let allSlabs = {};
  let allCategories = [];
  let currentView = 'grid';
  let PAGE_SIZE = 12;
  let currentPage = 1;
  let filteredProducts = [];

  // ── Cart count from localStorage ──
  function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem('mw_cart') || '[]');
    document.getElementById('cartCount').textContent = cart.length;
  }

  // ── Load everything ──
  async function init() {
    updateCartCount();

    // Check URL params for pre-selected category
    const params = new URLSearchParams(window.location.search);
    const preCategory = params.get('category');

    // Fetch categories
    const { data: cats } = await db.from('categories').select('*');
    allCategories = cats || [];
    renderCategoryFilters(preCategory);

    // Fetch all products with category join
    const { data: products } = await db
      .from('products')
      .select('*, categories(name)');
    allProducts = products || [];

    // Fetch all slabs
    const { data: slabs } = await db.from('price_slabs').select('*').order('min_qty');
    (slabs || []).forEach(s => {
      if (!allSlabs[s.product_id]) allSlabs[s.product_id] = [];
      allSlabs[s.product_id].push(s);
    });

    // Render brand filters
    renderBrandFilters();

    // Apply filters (will use preCategory if set)
    applyFilters();

    // Listen to filters
    document.querySelectorAll('input[name="stock"]').forEach(r => r.addEventListener('change', applyFilters));
    document.getElementById('priceMin').addEventListener('input', debounce(applyFilters, 400));
    document.getElementById('priceMax').addEventListener('input', debounce(applyFilters, 400));
    document.getElementById('searchInput').addEventListener('input', debounce(applyFilters, 300));
  }

  function renderCategoryFilters(preSelected) {
    const container = document.getElementById('categoryFilters');
    container.innerHTML = `
      <div class="filter-option">
        <input type="radio" name="category" id="cat-all" value="all" ${!preSelected ? 'checked' : ''}>
        <label for="cat-all">All Categories</label>
      </div>
    `;
    allCategories.forEach(cat => {
      const div = document.createElement('div');
      div.className = 'filter-option';
      div.innerHTML = `
        <input type="radio" name="category" id="cat-${cat.id}" value="${cat.id}" ${preSelected === cat.id ? 'checked' : ''}>
        <label for="cat-${cat.id}">${cat.icon || ''} ${cat.name}</label>
      `;
      container.appendChild(div);
    });
    container.querySelectorAll('input[name="category"]').forEach(r => r.addEventListener('change', applyFilters));
  }

  function renderBrandFilters() {
    const brands = [...new Set(allProducts.map(p => p.brand).filter(Boolean))];
    const container = document.getElementById('brandFilters');
    container.innerHTML = '';
    brands.forEach((brand, i) => {
      const div = document.createElement('div');
      div.className = 'filter-option';
      div.innerHTML = `
        <input type="checkbox" id="brand-${i}" value="${brand}" class="brand-check">
        <label for="brand-${i}">${brand}</label>
      `;
      container.appendChild(div);
    });
    container.querySelectorAll('.brand-check').forEach(c => c.addEventListener('change', applyFilters));
  }

  function applyFilters() {
    const search = document.getElementById('searchInput').value.toLowerCase().trim();
    const category = document.querySelector('input[name="category"]:checked')?.value || 'all';
    const stock = document.querySelector('input[name="stock"]:checked')?.value || 'all';
    const priceMin = parseFloat(document.getElementById('priceMin').value) || 0;
    const priceMax = parseFloat(document.getElementById('priceMax').value) || Infinity;
    const selectedBrands = [...document.querySelectorAll('.brand-check:checked')].map(c => c.value);
    const sort = document.getElementById('sortSelect').value;

    filteredProducts = allProducts.filter(p => {
      const slabs = allSlabs[p.id] || [];
      const startPrice = slabs.length > 0 ? slabs[0].price_per_unit : 0;

      if (search && !p.name.toLowerCase().includes(search) &&
          !p.brand?.toLowerCase().includes(search) &&
          !p.composition?.toLowerCase().includes(search)) return false;

      if (category !== 'all' && p.category_id !== category) return false;

      if (stock === 'in' && !p.in_stock) return false;
      if (stock === 'out' && p.in_stock) return false;

      if (startPrice < priceMin || startPrice > priceMax) return false;

      if (selectedBrands.length > 0 && !selectedBrands.includes(p.brand)) return false;

      return true;
    });

    // Sort
    filteredProducts.sort((a, b) => {
      const aPrice = (allSlabs[a.id]?.[0]?.price_per_unit) || 0;
      const bPrice = (allSlabs[b.id]?.[0]?.price_per_unit) || 0;
      if (sort === 'price_asc') return aPrice - bPrice;
      if (sort === 'price_desc') return bPrice - aPrice;
      if (sort === 'name_asc') return a.name.localeCompare(b.name);
      if (sort === 'moq_asc') return a.moq - b.moq;
      return 0;
    });

    currentPage = 1;
    renderProducts();
    renderActiveTags(search, category, stock, priceMin, priceMax, selectedBrands);
  }

  function renderProducts() {
    const grid = document.getElementById('productsGrid');
    const count = document.getElementById('resultsCount');
    const loadMoreWrap = document.getElementById('loadMoreWrap');

    const pageProducts = filteredProducts.slice(0, currentPage * PAGE_SIZE);

    count.innerHTML = `<strong>${filteredProducts.length}</strong> products found`;

    if (filteredProducts.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🔍</div>
          <h3>No products found</h3>
          <p>Try adjusting your filters or search terms</p>
        </div>`;
      loadMoreWrap.style.display = 'none';
      return;
    }

    grid.innerHTML = '';
    pageProducts.forEach((product, i) => {
      const slabs = allSlabs[product.id] || [];
      const startPrice = slabs.length > 0 ? slabs[0].price_per_unit : null;
      const catName = product.categories?.name || '';
      const icon = catEmojis[catName] || '💊';

      const card = document.createElement('a');
      card.href = `product.html?id=${product.id}`;
      card.className = 'product-card';
      card.style.animationDelay = `${(i % PAGE_SIZE) * 0.05}s`;
      card.innerHTML = `
        <div class="product-img">
          ${icon}
          <div class="product-badge ${product.in_stock ? 'badge-in' : 'badge-out'}">
            ${product.in_stock ? 'In Stock' : 'Out of Stock'}
          </div>
        </div>
        <div class="product-body">
          <div class="product-brand">${product.brand || 'Generic'}</div>
          <div class="product-name">${product.name}</div>
          <div class="product-composition">${product.composition || ''} ${product.strength ? '· ' + product.strength : ''}</div>
          <div class="product-footer">
            <div class="product-price">
              ${startPrice ? '₹' + startPrice.toFixed(2) : 'Get Quote'}
              <span>${startPrice ? '/unit' : ''}</span>
            </div>
            <div class="product-moq">MOQ: <strong>${product.moq}</strong></div>
          </div>
        </div>`;
      grid.appendChild(card);
    });

    loadMoreWrap.style.display = filteredProducts.length > currentPage * PAGE_SIZE ? 'block' : 'none';
  }

  function loadMore() {
    currentPage++;
    renderProducts();
  }

  function renderActiveTags(search, category, stock, priceMin, priceMax, brands) {
    const container = document.getElementById('activeFilters');
    container.innerHTML = '';

    if (search) addTag(container, `"${search}"`, () => { document.getElementById('searchInput').value = ''; applyFilters(); });
    if (category !== 'all') {
      const cat = allCategories.find(c => c.id === category);
      if (cat) addTag(container, cat.name, () => { document.getElementById('cat-all').checked = true; applyFilters(); });
    }
    if (stock !== 'all') addTag(container, stock === 'in' ? 'In Stock' : 'Out of Stock', () => { document.getElementById('stock-all').checked = true; applyFilters(); });
    if (priceMin > 0) addTag(container, `Min ₹${priceMin}`, () => { document.getElementById('priceMin').value = ''; applyFilters(); });
    if (priceMax < Infinity) addTag(container, `Max ₹${priceMax}`, () => { document.getElementById('priceMax').value = ''; applyFilters(); });
    brands.forEach(b => addTag(container, b, () => {
      document.querySelectorAll('.brand-check').forEach(c => { if (c.value === b) c.checked = false; });
      applyFilters();
    }));
  }

  function addTag(container, label, onRemove) {
    const tag = document.createElement('div');
    tag.className = 'filter-tag';
    tag.innerHTML = `${label} <button onclick="">✕</button>`;
    tag.querySelector('button').addEventListener('click', onRemove);
    container.appendChild(tag);
  }

  function clearAllFilters() {
    document.getElementById('cat-all').checked = true;
    document.getElementById('stock-all').checked = true;
    document.getElementById('priceMin').value = '';
    document.getElementById('priceMax').value = '';
    document.getElementById('searchInput').value = '';
    document.querySelectorAll('.brand-check').forEach(c => c.checked = false);
    applyFilters();
  }

  function clearSearch() {
    document.getElementById('searchInput').value = '';
    applyFilters();
  }

  function setView(v) {
    currentView = v;
    const grid = document.getElementById('productsGrid');
    const gridBtn = document.getElementById('gridBtn');
    const listBtn = document.getElementById('listBtn');
    if (v === 'list') {
      grid.classList.add('list-view');
      listBtn.classList.add('active');
      gridBtn.classList.remove('active');
    } else {
      grid.classList.remove('list-view');
      gridBtn.classList.add('active');
      listBtn.classList.remove('active');
    }
  }

  function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('open');
  }

  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  }

  function debounce(fn, delay) {
    let timer;
    return function(...args) {
      clearTimeout(timer);
      timer = setTimeout(() => fn(...args), delay);
    };
  }

  init();
</script>

</body>
</html>
